<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F6B5C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Cart &amp; Checkout · SMSM Store</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/theme.css" rel="stylesheet">
</head>
<body>

  <header class="app-topbar">
    <a href="/" class="brand"><span class="brand-dot"></span> SMSM Store</a>
    <div class="topbar-actions">
      <a href="/track/" class="icon-btn" aria-label="Track order">📦</a>
      <a href="/cart/" class="icon-btn" aria-label="View cart">
        🛒
        <span class="count-badge" id="topbar-cart-count" style="display:none;">0</span>
      </a>
    </div>
  </header>

  <main class="app-main">
    <div class="container-app">
      <h1>Your Cart</h1>

<div id="cart-items" class="stack-md" style="margin-bottom: var(--space-4);"></div>
<div class="surface-card" style="display:flex; justify-content:space-between; align-items:center;">
  <span style="font-weight:600;">Total</span>
  <span style="font-family:var(--font-display); font-weight:700; font-size:18px;">₹<span id="cart-total">0</span></span>
</div>

<h2 style="margin-top: var(--space-5);">Delivery Details</h2>
<form id="checkout-form" class="surface-card">
  <div class="form-field">
    <label class="form-label" for="c-name">Full name</label>
    <input type="text" class="form-control" id="c-name" required>
  </div>
  <div class="form-field">
    <label class="form-label" for="c-email">Email</label>
    <input type="email" class="form-control" id="c-email" required>
  </div>
  <div class="form-field">
    <label class="form-label" for="c-address">Address</label>
    <input type="text" class="form-control" id="c-address" required>
  </div>
  <div class="row g-2">
    <div class="col-6 form-field">
      <label class="form-label" for="c-city">City</label>
      <input type="text" class="form-control" id="c-city" required>
    </div>
    <div class="col-6 form-field">
      <label class="form-label" for="c-state">State</label>
      <input type="text" class="form-control" id="c-state" required>
    </div>
  </div>

  <!-- 🔧 REPLACE "YOUR_TURNSTILE_SITE_KEY" below with your real site key -->
  <div class="cf-turnstile" data-sitekey="0x4AAAAAAD8QTWA3w68uFiB1" style="margin: var(--space-3) 0;"></div>

  <button type="submit" class="btn btn-primary btn-block">Place Order (Cash on Delivery)</button>
</form>

<div id="order-result" style="margin-top: var(--space-3);"></div>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>
  .cart-row {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: var(--space-3);
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: var(--shadow-sm);
  }
  .cart-row .cart-row-name { font-weight: 600; font-size: 14px; }
  .cart-row .cart-row-meta { font-size: 12px; color: var(--color-text-muted); }
</style>

<script>
  function getCart() {
    return JSON.parse(localStorage.getItem("cart") || "[]");
  }
  function saveCart(cart) {
    localStorage.setItem("cart", JSON.stringify(cart));
    document.dispatchEvent(new Event("cart:updated"));
  }

  function renderCart() {
    const cart = getCart();
    const el = document.getElementById("cart-items");

    if (cart.length === 0) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🛒</div>
          <p>Your cart is empty.</p>
          <a href="/catalog/" class="btn btn-outline-primary btn-sm">Browse products</a>
        </div>`;
      document.getElementById("cart-total").textContent = "0";
      return;
    }

    el.innerHTML = cart.map((item, idx) => `
      <div class="cart-row">
        <div>
          <div class="cart-row-name">${item.name}</div>
          <div class="cart-row-meta">${item.size} · Qty ${item.qty} · ₹${item.price * item.qty}</div>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="removeItem(${idx})">Remove</button>
      </div>
    `).join("");

    const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
    document.getElementById("cart-total").textContent = total;
  }

  function removeItem(idx) {
    const cart = getCart();
    cart.splice(idx, 1);
    saveCart(cart);
    renderCart();
  }

  document.getElementById("checkout-form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const cart = getCart();
    if (cart.length === 0) {
      alert("Your cart is empty.");
      return;
    }

    const turnstileToken = document.querySelector('[name="cf-turnstile-response"]')?.value;
    if (!turnstileToken) {
      alert("Please complete the captcha check.");
      return;
    }

    const customer = {
      name: document.getElementById("c-name").value,
      email: document.getElementById("c-email").value,
      address: document.getElementById("c-address").value,
      city: document.getElementById("c-city").value,
      state: document.getElementById("c-state").value
    };

    const resultEl = document.getElementById("order-result");
    resultEl.innerHTML = `<div class="alert alert-info">Placing order...</div>`;

    try {
      const res = await fetch("/api/order", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ customer, items: cart, turnstileToken })
      });
      const data = await res.json();

      if (data.success) {
        localStorage.removeItem("cart");
        document.dispatchEvent(new Event("cart:updated"));
        resultEl.innerHTML = `<div class="alert alert-success">Order placed! Your order ID is <b>${data.order_id}</b>. A confirmation email has been sent.</div>`;
        document.getElementById("cart-items").innerHTML = "";
        document.getElementById("checkout-form").style.display = "none";
      } else {
        resultEl.innerHTML = `<div class="alert alert-danger">Order failed: ${data.error || "unknown error"}</div>`;
      }
    } catch (err) {
      resultEl.innerHTML = `<div class="alert alert-danger">Order failed. Check console.</div>`;
      console.error(err);
    }
  });

  renderCart();
</script>

    </div>
  </main>

  <nav class="app-bottomnav">
    <a href="/" class="nav-item ">
      <span class="nav-icon">🏠</span> Home
    </a>
    <a href="/catalog/" class="nav-item ">
      <span class="nav-icon">🛍️</span> Shop
    </a>
    <a href="/cart/" class="nav-item active">
      <span class="nav-icon">🛒</span> Cart
    </a>
    <a href="/track/" class="nav-item ">
      <span class="nav-icon">📦</span> Track
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Keeps the topbar cart badge in sync everywhere - independent of
    // each page's own cart logic, purely cosmetic.
    function refreshTopbarCartBadge() {
      const cart = JSON.parse(localStorage.getItem("cart") || "[]");
      const count = cart.reduce((sum, i) => sum + i.qty, 0);
      const badge = document.getElementById("topbar-cart-count");
      if (!badge) return;
      if (count > 0) {
        badge.style.display = "flex";
        badge.textContent = count;
      } else {
        badge.style.display = "none";
      }
    }
    refreshTopbarCartBadge();
    window.addEventListener("storage", refreshTopbarCartBadge);
    document.addEventListener("cart:updated", refreshTopbarCartBadge);
  </script>
</body>
</html>
