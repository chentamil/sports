<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F6B5C">
  <title>Admin Dashboard · SMSM Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/theme.css" rel="stylesheet">
</head>
<body>

  <header class="app-topbar">
    <span class="brand"><span class="brand-dot"></span> Admin Dashboard</span>
    <div class="topbar-actions"></div>
  </header>

  <main class="app-main" style="padding-bottom: var(--space-5);">
    <div class="container-app">
      <div style="display:flex; justify-content:flex-end; margin-bottom: var(--space-3);">
  <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
</div>

<h2>Add Product</h2>
<form id="add-form" class="surface-card">
  <div class="form-field">
    <label class="form-label" for="p-name">Product name</label>
    <input type="text" class="form-control" id="p-name" required>
  </div>
  <div class="form-field">
    <label class="form-label" for="p-photo">Photo URL</label>
    <input type="text" class="form-control" id="p-photo" required>
  </div>
  <div class="form-field">
    <label class="form-label" for="p-sizes">Sizes (JSON)</label>
    <input type="text" class="form-control" id="p-sizes" placeholder='{"S":100,"M":120}' required>
  </div>
  <button type="submit" class="btn btn-primary btn-block">Add Product</button>
</form>
<div id="add-result" style="margin-top: var(--space-2);"></div>

<h2 style="margin-top: var(--space-5);">Products</h2>
<div id="product-list">
  <div class="skeleton skeleton-line" style="height:60px;"></div>
</div>

<h2 style="margin-top: var(--space-5);">Orders</h2>
<div id="order-list">
  <div class="skeleton skeleton-line" style="height:60px;"></div>
</div>

<script>
  async function logout() {
    await fetch("/api/admin-logout", { method: "POST" });
    window.location.href = "/admin-login/";
  }

  async function loadProducts() {
    const res = await fetch("/api/admin/products");
    const products = await res.json();
    const el = document.getElementById("product-list");

    if (!Array.isArray(products) || products.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><p>No products yet.</p></div>`;
      return;
    }

    el.innerHTML = `
      <table class="table-app">
        <thead><tr><th>Name</th><th>Photo</th><th>Sizes</th><th>Actions</th></tr></thead>
        <tbody>
          ${products.map(p => `
            <tr>
              <td data-label="Name">${p.name}</td>
              <td data-label="Photo"><span style="word-break:break-all; font-size:12px;">${p.photo}</span></td>
              <td data-label="Sizes">${JSON.stringify(p.sizes)}</td>
              <td data-label="Actions"><button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">Delete</button></td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  }

  async function deleteProduct(id) {
    if (!confirm("Delete this product?")) return;
    await fetch("/api/admin/products", {
      method: "DELETE",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id })
    });
    loadProducts();
  }

  document.getElementById("add-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const resultEl = document.getElementById("add-result");

    let sizes;
    try {
      sizes = JSON.parse(document.getElementById("p-sizes").value);
    } catch {
      resultEl.innerHTML = `<div class="alert alert-danger">Sizes must be valid JSON, e.g. {"S":100,"M":120}</div>`;
      return;
    }

    const res = await fetch("/api/admin/products", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name: document.getElementById("p-name").value,
        photo: document.getElementById("p-photo").value,
        sizes
      })
    });
    const data = await res.json();

    if (data.success) {
      resultEl.innerHTML = `<div class="alert alert-success">Product added.</div>`;
      document.getElementById("add-form").reset();
      loadProducts();
    } else {
      resultEl.innerHTML = `<div class="alert alert-danger">${data.error || "unknown error"}</div>`;
    }
  });

  async function loadOrders() {
    const res = await fetch("/api/admin/orders");
    const orders = await res.json();
    const el = document.getElementById("order-list");

    if (!Array.isArray(orders) || orders.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">🧾</div><p>No orders yet.</p></div>`;
      return;
    }

    const statuses = ["UNPAID", "CONFIRMED", "SHIPPED", "DELIVERED", "CANCELLED"];

    el.innerHTML = `
      <table class="table-app">
        <thead><tr><th>Order ID</th><th>Customer</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>
          ${orders.map(o => `
            <tr>
              <td data-label="Order ID">${o.order_id}</td>
              <td data-label="Customer">${o.customer.name}<br><span style="font-size:12px; color:var(--color-text-muted);">${o.customer.email}</span></td>
              <td data-label="Amount">₹${o.amount}</td>
              <td data-label="Status">
                <select class="form-select form-select-sm" style="width:auto;" onchange="updateStatus('${o.order_id}', this.value)">
                  ${statuses.map(s => `<option value="${s}" ${s === o.status ? "selected" : ""}>${s}</option>`).join("")}
                </select>
              </td>
              <td data-label="Date">${new Date(o.date).toLocaleString()}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  }

  async function updateStatus(orderId, status) {
    await fetch("/api/admin/orders", {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ order_id: orderId, status })
    });
  }

  loadProducts();
  loadOrders();
</script>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
