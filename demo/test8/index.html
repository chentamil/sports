<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ecommerce Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick-theme.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.css">

<style>
/* Modal images stretched: not by css,js function openGallery,WRONG width/height ratio passed to PhotoSwipe */

.pswp__img {
  object-fit: contain !important;
}

body { background:#f4f6f9; }

.card {
  border-radius:12px;
  overflow:hidden;
  background:#fff;
  margin-bottom:20px;
}

.price { color:green; font-weight:bold; }

.product-slider img {
  width:100%;
  height:220px;
  object-fit:cover;
}

.share-btn {
  border:none;
  background:none;
  cursor:pointer;
  margin-left:8px;
}

.toast-box {
  position:fixed;
  top:20px;
  right:20px;
  background:#28a745;
  color:#fff;
  padding:10px 15px;
  border-radius:6px;
  display:none;
  z-index:9999;
}

#categories .btn {
  margin-right: 5px;
  margin-bottom: 5px;
}

/* Accordion styles */
.acc-header {
  cursor: pointer;
  display:flex;
  justify-content: space-between;
  align-items: center;
  padding:5px 0;
  margin-top:10px;
  font-weight:bold;
}

.acc-header svg {
  transition: transform 0.3s;
}

/* .acc-header svg.rotate {
  transform: rotate(180deg);
} */

/* Remove default rotate */
.acc-header svg.rotate-180 {
  transform: rotate(180deg);
}

.acc-content {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.3s ease;
}
</style>
</head>

<body>

<div class="container my-4">

  <!-- CATEGORY BUTTONS -->
  <div id="categories" class="mb-3 sticky-top bg-white p-2">
    <button class="btn btn-dark btn-sm filter-btn" onclick="setCategory('all')">All</button>
    <button class="btn btn-outline-dark btn-sm filter-btn" onclick="setCategory('Lehenga')">Lehenga</button>
    <button class="btn btn-outline-dark btn-sm filter-btn" onclick="setCategory('Saree')">Saree</button>
    <button class="btn btn-outline-dark btn-sm filter-btn" onclick="setCategory('Kurti')">Kurti</button>
    <button class="btn btn-outline-dark btn-sm filter-btn" onclick="setCategory('Shirt')">Shirt</button>
    <button class="btn btn-outline-dark btn-sm filter-btn" onclick="setCategory('Pant')">Pant</button>
  </div>

  <!-- SEARCH -->
  <input id="search" class="form-control mb-3" placeholder="Search products...">

  <!-- SORT -->
  <select id="sort" class="form-select-sm mb-3">
    <option value="default">Sort by</option>
    <option value="low">Price: Low to High</option>
    <option value="high">Price: High to Low</option>
  </select>

  <div class="row" id="products"></div>

</div>

<div id="toast" class="toast-box">Link copied!</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>

<!-- PhotoSwipe -->
<script type="module">
import PhotoSwipeLightbox from 'https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe-lightbox.esm.js';
window.initLightbox = function(items){
  const lightbox = new PhotoSwipeLightbox({
    dataSource: items,
    pswpModule: () => import('https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.esm.js')
  });
  lightbox.init();
  lightbox.loadAndOpen(0);
};
</script>

<script>
const SHEET_API = "https://opensheet.elk.sh/1oJPvnsl4rUAJXNyWIyHnwJG96faKQmS8ZKaRKm6jt3E/Sheet1";
const phone = "917339140916";

let allProducts = [];
let currentCategory = 'all';

/* FETCH */
fetch(SHEET_API)
  .then(res => res.json())
  .then(data => {
    allProducts = data;
    render(data); // initial render
  });

/* RENDER */
function render(products){
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach((p,i)=>{
    container.innerHTML += `
      <div class="col-md-4">
        <div class="card p-2">
          <div class="product-slider slider-${i}">
            <div><img src="${p.image1}"></div>
            <div><img src="${p.image2}"></div>
            <div><img src="${p.image3}"></div>
          </div>

          <div class="p-2">
            <h6>${p.name}</h6>

            <div class="d-flex align-items-center justify-content-between">
              <div class="price">₹ ${p.price}</div>

              <button class="share-btn" onclick="shareProduct('${p.name}','${p.price}')">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-share" viewBox="0 0 16 16">
                  <path d="M13.5 1a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3M11 2.5a2.5 2.5 0 1 1 .603 1.628l-6.718 3.12a2.5 2.5 0 0 1 0 1.504l6.718 3.12a2.5 2.5 0 1 1-.488.876l-6.718-3.12a2.5 2.5 0 1 1 0-3.256l6.718-3.12A2.5 2.5 0 0 1 11 2.5m-8.5 4a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3m11 5.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3"></path>
                </svg>
              </button>
            </div>

            <a target="_blank"
               class="btn btn-success btn-sm w-100 mt-2"
               href="https://wa.me/${phone}?text=${encodeURIComponent('Hi I want '+p.name+' ₹'+p.price)}">
              Buy on WhatsApp
            </a>

            <button class="btn btn-outline-dark btn-sm w-100 mt-2"
              onclick="openGallery(${i})">
              View Gallery
            </button>

<!-- Accordion View Details -->
<div class="acc-header" onclick="toggleAcc('acc${i}', this)">
  <span>View Details</span>
  <svg width="18" height="18" class="rotate">
    <path d="M7 10l5 5 5-5" stroke="black" stroke-width="2" fill="none"></path>
  </svg>
</div>

<div class="acc-content" id="acc${i}" style="max-height: 0; overflow: hidden; transition: max-height 0.3s ease;">
  ${p.desc ? `<p class="mb-1"><b>Desc:</b> ${p.desc}</p>` : ""}
  <table class="table table-bordered mt-2">
    ${Object.entries({
      Category: p.category || "-",
      Color: p.color || "-",
      Code: p.code || "-"
    }).map(([k,v]) =>
      `<tr><td><b>${k}</b></td><td>${v}</td></tr>`
    ).join("")}
  </table>
</div>

          </div>
        </div>
      </div>
    `;
  });

  setTimeout(()=>{
    $('.product-slider').not('.slick-initialized').slick({
      dots:true,
      arrows:true
    });
  },300);
}

/* =========================
   FILTER FUNCTIONS
========================= */

/* Set category from buttons */
function setCategory(cat){
  currentCategory = cat;
  document.querySelectorAll('#categories .filter-btn').forEach(btn=>{
    btn.classList.remove('btn-dark');
    btn.classList.remove('btn-outline-dark');
    if(btn.textContent === cat || (cat==='all' && btn.textContent==='All')){
      btn.classList.add('btn-dark');
    } else {
      btn.classList.add('btn-outline-dark');
    }
  });
  applyFilters();
}

/* Event listeners */
document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('sort').addEventListener('change', applyFilters);

/* Apply filters & sort */
function applyFilters(){
  const searchVal = document.getElementById('search').value.toLowerCase();
  const sortVal = document.getElementById('sort').value;

  let filtered = allProducts;

  if(currentCategory !== 'all'){
    filtered = filtered.filter(p => p.category === currentCategory);
  }

  if(searchVal){
    filtered = filtered.filter(p => p.name.toLowerCase().includes(searchVal));
  }

  if(sortVal === 'low'){
    filtered.sort((a,b) => Number(a.price) - Number(b.price));
  } else if(sortVal === 'high'){
    filtered.sort((a,b) => Number(b.price) - Number(a.price));
  }

  render(filtered);
}

/* =========================
   ZOOM GALLERY
========================= */
// function openGallery(i){
//   const p = allProducts[i];
//   const items = [
//     { src: p.image1, w:1200, h:900 },
//     { src: p.image2, w:1200, h:900 },
//     { src: p.image3, w:1200, h:900 }
//   ];
//   window.initLightbox(items);
// }

function openGallery(i){
  const p = allProducts[i];
  const imgs = [p.image1, p.image2, p.image3];

  const items = [];

  let loaded = 0;

  imgs.forEach((src, index) => {
    const img = new Image();

    img.onload = function () {
      items[index] = {
        src: src,
        w: img.naturalWidth,
        h: img.naturalHeight
      };

      loaded++;

      if (loaded === imgs.length) {
        window.initLightbox(items);
      }
    };

    img.src = src;
  });
}

/* =========================
   SHARE
========================= */
function shareProduct(name,price){
  const url = location.href + "#product";
  const text = `Check this product: ${name} (₹ ${price})`;

  if(navigator.share){
    navigator.share({ title:name, text:text, url:url });
  } else {
    navigator.clipboard.writeText(text + " " + url);
    showToast();
  }
}

/* TOAST */
function showToast(){
  const t = document.getElementById("toast");
  t.style.display = "block";
  setTimeout(()=> t.style.display="none", 2000);
}

/* =========================
   ACCORDION
========================= */
function toggleAcc(id, el){
  const acc = document.getElementById(id);
  const isOpen = acc.style.maxHeight && acc.style.maxHeight !== "0px";

  // Close all other accordions (optional)
  document.querySelectorAll('.acc-content').forEach(c => c.style.maxHeight = "0px");
  document.querySelectorAll('.acc-header svg').forEach(s => s.classList.remove('rotate-180'));

  if(!isOpen){
    // Open clicked accordion
    acc.style.maxHeight = acc.scrollHeight + "px";
    el.querySelector('svg').classList.add('rotate-180');
  } else {
    // Close clicked accordion
    acc.style.maxHeight = "0px";
    el.querySelector('svg').classList.remove('rotate-180');
  }
}
</script>

</body>
</html>
