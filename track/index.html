<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F6B5C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Track Order · SMSM Store</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/theme.css" rel="stylesheet">
</head>
<body>

  <header class="app-topbar">
    <a href="/" class="brand"><span class="brand-dot"></span> SMSM Store</a>
    <div class="topbar-actions">
      <a href="/track/" class="icon-btn" aria-label="Track order">📦</a>
      <a href="/cart/" class="icon-btn" aria-label="View cart">
        🛒
        <span class="count-badge" id="topbar-cart-count" style="display:none;">0</span>
      </a>
    </div>
  </header>

  <main class="app-main">
    <div class="container-app">
      <h1>Track Your Order</h1>

<form id="track-form" class="surface-card" style="display:flex; gap: var(--space-2);">
  <input type="text" class="form-control" id="order-id-input" placeholder="Enter Order ID" required>
  <button type="submit" class="btn btn-primary" style="white-space:nowrap;">Track</button>
</form>

<div id="track-result" style="margin-top: var(--space-4);"></div>

<script>
  document.getElementById("track-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const orderId = document.getElementById("order-id-input").value.trim();
    const resultEl = document.getElementById("track-result");
    resultEl.innerHTML = `<div class="alert alert-info">Looking up order...</div>`;

    try {
      const res = await fetch("/api/track?order_id=" + encodeURIComponent(orderId));
      const order = await res.json();

      if (!order) {
        resultEl.innerHTML = `<div class="alert alert-warning">No order found with that ID.</div>`;
        return;
      }

      resultEl.innerHTML = `
        <div class="surface-card">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0;">Order #${order.order_id}</h3>
            <span class="badge" data-status="${order.status}">${order.status}</span>
          </div>
          <p style="margin: var(--space-2) 0 0;">Amount: <strong>₹${order.amount}</strong></p>
          <p style="margin:0;">Placed: ${new Date(order.date).toLocaleString()}</p>
          <div class="stack-sm" style="margin-top: var(--space-3);">
            ${order.items.map(i => `
              <div style="display:flex; justify-content:space-between; font-size:14px;">
                <span>${i.name} (${i.size}) x ${i.qty}</span>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    } catch (err) {
      resultEl.innerHTML = `<div class="alert alert-danger">Error looking up order.</div>`;
      console.error(err);
    }
  });
</script>

    </div>
  </main>

  <nav class="app-bottomnav">
    <a href="/" class="nav-item ">
      <span class="nav-icon">🏠</span> Home
    </a>
    <a href="/catalog/" class="nav-item ">
      <span class="nav-icon">🛍️</span> Shop
    </a>
    <a href="/cart/" class="nav-item ">
      <span class="nav-icon">🛒</span> Cart
    </a>
    <a href="/track/" class="nav-item active">
      <span class="nav-icon">📦</span> Track
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Keeps the topbar cart badge in sync everywhere - independent of
    // each page's own cart logic, purely cosmetic.
    function refreshTopbarCartBadge() {
      const cart = JSON.parse(localStorage.getItem("cart") || "[]");
      const count = cart.reduce((sum, i) => sum + i.qty, 0);
      const badge = document.getElementById("topbar-cart-count");
      if (!badge) return;
      if (count > 0) {
        badge.style.display = "flex";
        badge.textContent = count;
      } else {
        badge.style.display = "none";
      }
    }
    refreshTopbarCartBadge();
    window.addEventListener("storage", refreshTopbarCartBadge);
    document.addEventListener("cart:updated", refreshTopbarCartBadge);
  </script>
</body>
</html>
