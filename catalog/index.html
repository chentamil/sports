<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F6B5C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Catalog · SMSM Store</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/theme.css" rel="stylesheet">
</head>
<body>

  <header class="app-topbar">
    <a href="/" class="brand"><span class="brand-dot"></span> SMSM Store</a>
    <div class="topbar-actions">
      <a href="/track/" class="icon-btn" aria-label="Track order">📦</a>
      <a href="/cart/" class="icon-btn" aria-label="View cart">
        🛒
        <span class="count-badge" id="topbar-cart-count" style="display:none;">0</span>
      </a>
    </div>
  </header>

  <main class="app-main">
    <div class="container-app">
      <h1>Our Products</h1>

<div class="row g-3" id="catalog">
  <!-- skeleton placeholders shown until products load -->
  <div class="col-6 col-md-4 col-lg-3 skeleton-slot">
    <div class="skeleton-card">
      <div class="skeleton skeleton-img"></div>
      <div class="skeleton skeleton-line" style="width: 70%;"></div>
      <div class="skeleton skeleton-line" style="width: 40%;"></div>
    </div>
  </div>
  <div class="col-6 col-md-4 col-lg-3 skeleton-slot">
    <div class="skeleton-card">
      <div class="skeleton skeleton-img"></div>
      <div class="skeleton skeleton-line" style="width: 70%;"></div>
      <div class="skeleton skeleton-line" style="width: 40%;"></div>
    </div>
  </div>
  <div class="col-6 col-md-4 col-lg-3 skeleton-slot">
    <div class="skeleton-card">
      <div class="skeleton skeleton-img"></div>
      <div class="skeleton skeleton-line" style="width: 70%;"></div>
      <div class="skeleton skeleton-line" style="width: 40%;"></div>
    </div>
  </div>
</div>

<!-- Sticky cart bar - signature element, appears once something is added -->
<div class="cart-bar" id="cart-bar">
  <div class="cart-bar-info">
    <strong id="cart-bar-total">₹0</strong>
    <span id="cart-bar-count">0 items</span>
  </div>
  <a href="/cart/" class="btn btn-accent">View Cart →</a>
</div>

<script>
  function getCart() {
    return JSON.parse(localStorage.getItem("cart") || "[]");
  }
  function saveCart(cart) {
    localStorage.setItem("cart", JSON.stringify(cart));
    document.dispatchEvent(new Event("cart:updated"));
    refreshCartBar();
  }
  function refreshCartBar() {
    const cart = getCart();
    const bar = document.getElementById("cart-bar");
    const count = cart.reduce((sum, i) => sum + i.qty, 0);
    const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);

    if (count > 0) {
      bar.classList.add("visible");
      document.getElementById("cart-bar-total").textContent = "₹" + total;
      document.getElementById("cart-bar-count").textContent = count + (count === 1 ? " item" : " items");
    } else {
      bar.classList.remove("visible");
    }
  }
  function addToCart(id, name, photo, size, price) {
    const cart = getCart();
    const existing = cart.find(i => i.id === id && i.size === size);
    if (existing) {
      existing.qty += 1;
    } else {
      cart.push({ id, name, photo, size, price, qty: 1 });
    }
    saveCart(cart);
  }

  async function loadCatalog() {
    const el = document.getElementById("catalog");
    try {
      const res = await fetch("/api/products");
      const products = await res.json();

      if (!Array.isArray(products) || products.length === 0) {
        el.innerHTML = `
          <div class="col-12">
            <div class="empty-state">
              <div class="empty-icon">🛍️</div>
              <p>No products here yet. Check back soon.</p>
            </div>
          </div>`;
        return;
      }

      el.innerHTML = products.map(p => {
        const sizeOptions = Object.entries(p.sizes)
          .map(([size, price]) => `<option value="${size}" data-price="${price}">${size} · ₹${price}</option>`)
          .join("");

        return `
          <div class="col-6 col-md-4 col-lg-3">
            <div class="product-card">
              <div class="product-img-wrap">
                <img src="${p.photo}" alt="${p.name}" loading="lazy">
              </div>
              <div class="product-body">
                <h3 class="product-name">${p.name}</h3>
                <select class="form-select form-select-sm" id="size-${p.id}">${sizeOptions}</select>
                <button class="btn btn-primary btn-sm btn-block" onclick="addFromCard(${p.id}, '${p.name.replace(/'/g, "\\'")}', '${p.photo}')">
                  Add to cart
                </button>
              </div>
            </div>
          </div>
        `;
      }).join("");

    } catch (err) {
      el.innerHTML = `
        <div class="col-12">
          <div class="alert alert-danger" role="alert">Could not load products. Please refresh.</div>
        </div>`;
      console.error(err);
    }
  }

  function addFromCard(id, name, photo) {
    const select = document.getElementById("size-" + id);
    const size = select.value;
    const price = Number(select.selectedOptions[0].dataset.price);
    addToCart(id, name, photo, size, price);
  }

  refreshCartBar();
  loadCatalog();
</script>

    </div>
  </main>

  <nav class="app-bottomnav">
    <a href="/" class="nav-item ">
      <span class="nav-icon">🏠</span> Home
    </a>
    <a href="/catalog/" class="nav-item active">
      <span class="nav-icon">🛍️</span> Shop
    </a>
    <a href="/cart/" class="nav-item ">
      <span class="nav-icon">🛒</span> Cart
    </a>
    <a href="/track/" class="nav-item ">
      <span class="nav-icon">📦</span> Track
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Keeps the topbar cart badge in sync everywhere - independent of
    // each page's own cart logic, purely cosmetic.
    function refreshTopbarCartBadge() {
      const cart = JSON.parse(localStorage.getItem("cart") || "[]");
      const count = cart.reduce((sum, i) => sum + i.qty, 0);
      const badge = document.getElementById("topbar-cart-count");
      if (!badge) return;
      if (count > 0) {
        badge.style.display = "flex";
        badge.textContent = count;
      } else {
        badge.style.display = "none";
      }
    }
    refreshTopbarCartBadge();
    window.addEventListener("storage", refreshTopbarCartBadge);
    document.addEventListener("cart:updated", refreshTopbarCartBadge);
  </script>
</body>
</html>
