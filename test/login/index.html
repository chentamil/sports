<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protected Page - Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      background: linear-gradient(135deg, #f5f7fa, #e4ecf7);
    }
    .card {
      border-radius: 14px;
    }
    .brand {
      font-weight: 600;
      letter-spacing: 0.5px;
    }
  </style>
</head>

<body class="d-flex align-items-center justify-content-center min-vh-100">

  <div class="container" style="max-width: 420px;">
    <div class="card shadow border-0 p-4">

      <h4 class="text-center mb-3 brand">User Login</h4>

      <!-- 🔴 ERROR MESSAGE -->
      <div id="errorBox" class="alert alert-danger d-none" role="alert"></div>

      <form method="POST" action="/test/login">
        <div class="mb-3">
          <label class="form-label text-muted">Username</label>
          <input name="username" class="form-control" required />
        </div>

        <div class="mb-3">
          <label class="form-label text-muted">Password</label>
          <input type="password" name="password" class="form-control" required />
        </div>

        <button class="btn btn-primary w-100">Login</button>

        <p class="mt-3 small text-muted text-center">
          Forgot password? <br />
          <a href="mailto:help@example.com">Contact support</a>
        </p>

        <div class="text-center small text-muted mt-2">
          © 2026 Your Shopname
        </div>
      </form>
    </div>
  </div>

  <!-- 🔧 SCRIPT FOR ERROR HANDLING -->
  <script>
    const params = new URLSearchParams(window.location.search);
    const error = params.get("error");

    const box = document.getElementById("errorBox");

    if (error) {
      let msg = "Login failed";

      if (error === "invalid") msg = "Wrong username or password";
      if (error === "expired") msg = "Session expired. Please login again";
      if (error === "rate") msg = "Too many attempts. Try again later";

      box.textContent = msg;
      box.classList.remove("d-none");
    }
  </script>

</body>
</html>
