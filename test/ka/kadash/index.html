<script>
let products = [];

// 🔹 LOAD DATA
async function loadData() {
  try {
    const res = await fetch("/api/products");

    if (!res.ok) throw new Error("Failed to load products");

    products = await res.json();
    renderTable();

  } catch (err) {
    console.error(err);
    alert("Failed to load products");
  }
}

// 🔹 RENDER TABLE
function renderTable() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  products.forEach((p, i) => {
    tbody.innerHTML += `
      <tr>
        <td>${p.name || ""}</td>
        <td>${p.price || ""}</td>
        <td><img src="${p.image1 || ""}"></td>
        <td>${p.category || ""}</td>
        <td>${p.code || ""}</td>
        <td>
          <button class="btn btn-sm btn-warning" onclick="editProduct(${i})">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteProduct(${i})">Delete</button>
        </td>
      </tr>
    `;
  });
}

// 🔹 OPEN FORM (ADD NEW)
function openForm() {
  document.getElementById("index").value = "";

  document
    .querySelectorAll("#productModal input, #productModal textarea")
    .forEach(e => e.value = "");

  new bootstrap.Modal(
    document.getElementById("productModal")
  ).show();
}

// 🔹 EDIT PRODUCT
function editProduct(i) {
  const p = products[i];

  document.getElementById("index").value = i;

  for (let key in p) {
    const el = document.getElementById(key);
    if (el) el.value = p[key];
  }

  new bootstrap.Modal(
    document.getElementById("productModal")
  ).show();
}

// 🔹 SAVE PRODUCT (LOCAL ONLY - NO API CALL)
function saveProduct() {
  const i = document.getElementById("index").value;

  const p = {
    name: document.getElementById("name").value,
    price: Number(document.getElementById("price").value),
    image1: document.getElementById("image1").value,
    image2: document.getElementById("image2").value,
    image3: document.getElementById("image3").value,
    color: document.getElementById("color").value,
    category: document.getElementById("category").value,
    code: document.getElementById("code").value,
    desc: document.getElementById("desc").value,
    paymentlink: document.getElementById("paymentlink").value
  };

  if (i === "") {
    products.push(p);
  } else {
    products[i] = p;
  }

  renderTable();

  bootstrap.Modal
    .getInstance(document.getElementById("productModal"))
    .hide();
}

// 🔹 DELETE PRODUCT (LOCAL ONLY - NO API CALL)
function deleteProduct(i) {
  if (confirm("Delete this product?")) {
    products.splice(i, 1);
    renderTable();
  }
}

// 🔹 SAVE ALL CHANGES (ONE COMMIT ONLY)
async function saveAll() {
  try {
    const res = await fetch("/api/products", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ products })
    });

    const data = await res.json();

    if (data.success) {
      alert("Saved successfully!");
    } else {
      alert("Save failed");
    }

  } catch (err) {
    console.error(err);
    alert("Error saving data");
  }
}

// 🔹 INITIAL LOAD
loadData();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
