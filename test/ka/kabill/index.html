<body>

</div>
<div class="card-body">


<!-- <h6>Seller</h6> -->
<input id="sName" class="form-control mb-2 d-none" placeholder="Company Name"  value="Sri Dhanalakshmi Jewellers">
<input id="sAddress" class="form-control mb-2 d-none" placeholder="Company Address" value="No 77AB, Near New Railway Station, Jawaharlal Street, Big Kanchipuram - 631502">

<div class="row g-2">
  <div class="col-12 col-md-4"><input id="sGst" class="form-control mb-2 d-none" placeholder="GSTIN" value="33AAPFS0212D1ZQ"></div>
  <div class="col-12 col-md-4"><input id="sMobile" class="form-control mb-2 d-none" placeholder="Mobile" value="+91 73393 92916"></div>
  <div class="col-12 col-md-4"><input id="sEmail" class="form-control mb-2 d-none" placeholder="Email (optional)" value="sdjkanchi2013@gmail.com"></div>
</div>

<input id="logoUrl" class="form-control mb-3 d-none" placeholder="Logo URL (optional)" value="https://www.achabazar.com/images/sdj-logo-white.jpg">

<h6>Customer</h6>
<input id="cName" class="form-control mb-2" placeholder="Customer Name">
<input id="cAddress" class="form-control mb-2" placeholder="Customer Address">

<div class="row g-2">
  <div class="col-12 col-md-6">
    <input id="cMobile" class="form-control mb-2" placeholder="Customer Mobile (optional)">
  </div>
  <div class="col-12 col-md-6">
    <input id="cEmail" class="form-control mb-2" placeholder="Customer Email (optional)">
  </div>
</div>

<h6>Products</h6>
<div class="table-responsive">
<table class="table table-bordered table-sm">
</div>
<thead>
<tr>
<th>Product</th><th>HSN</th><th>Qty</th><th>Price</th><th>GST %</th><th></th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<button class="btn btn-sm btn-outline-primary" onclick="addRow()">+ Add Product</button>

<div class="d-grid mt-3">
<button class="btn btn-primary" onclick="openInvoice()">Generate Invoice</button>
</div>

</div>
</div>
</div>

<script>
let rc = 0;
function addRow(){
  rows.insertAdjacentHTML("beforeend",`
  <tr id="r${rc}">
    <td><input class="form-control form-control-sm" id="p${rc}"></td>
    <td><input class="form-control" id="h${rc}"></td>
    <td><input type="number" class="form-control" id="q${rc}" value="1"></td>
    <td><input type="number" class="form-control" id="pr${rc}" value="0"></td>
    <td><input type="number" class="form-control" id="g${rc}" value="18"></td>
    <td><button class="btn btn-sm btn-danger" onclick="r${rc}.remove()">×</button></td>
  </tr>`);
  rc++;
}
addRow();

/* -------- Number to Words (INR) -------- */
function numberToWords(num){
  const a=["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten",
           "Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
  const b=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
  if(num===0) return "Zero";
  function inWords(n){
    if(n<20) return a[n];
    if(n<100) return b[Math.floor(n/10)]+" "+a[n%10];
    if(n<1000) return a[Math.floor(n/100)]+" Hundred "+inWords(n%100);
    if(n<100000) return inWords(Math.floor(n/1000))+" Thousand "+inWords(n%1000);
    return inWords(Math.floor(n/100000))+" Lakh "+inWords(n%100000);
  }
  return inWords(num).trim();
}

function openInvoice(){
  const w = window.open("", "_blank");


  const invoiceNo = "INV-" + Date.now();
  let rowsHtml = "", taxable = 0, gstTotal = 0;

  for(let i=0;i<rc;i++){
    if(!document.getElementById("r"+i)) continue;

    const qty   = Number(document.getElementById("q"+i).value);
    const price = Number(document.getElementById("pr"+i).value);
    const gst   = Number(document.getElementById("g"+i).value);

    const base = qty * price;
    const gstAmt = base * gst / 100;
    const total = base + gstAmt;

    taxable += base;
    gstTotal += gstAmt;

    rowsHtml += `
    <tr>
      <td>${document.getElementById("p"+i).value}</td>
      <td>${document.getElementById("h"+i).value}</td>
      <td>${qty}</td>
      <td>₹${price}</td>
      <td>${gst}%</td>
      <td>₹${gstAmt.toFixed(2)}</td>
      <td>₹${total.toFixed(2)}</td>
    </tr>`;
  }

  const grandTotal = taxable + gstTotal;
  const words = numberToWords(Math.round(grandTotal));
  const pageUrl = location.href;

  const waInvoiceMsg =
`Tax invoice/Bill has been generated successfully.
Click below link to view:
${pageUrl}`;

  const waPayMsg =
`Tap the link below to pay *Rs.${grandTotal.toFixed(2)}*
upi://pay?pa=917339392916@sbi&pn=Rahul.com&am=${grandTotal.toFixed(2)}&cu=INR&tr=${invoiceNo}&tn=OrderId%20${invoiceNo}`;

  w.document.write(`
<!DOCTYPE html><html><head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
  background:linear-gradient(120deg,#eef3f8,#ffffff);
  font-family:Arial,Helvetica,sans-serif;
}
.invoice{
   max-width: 900px;
    margin: auto;
    background: #fff;
    padding: 35px;
    font-family: var(--bs-body-font-family);
    font-size: 0.9rem;
}
.header{
  border-bottom:1px solid #000;
  margin-bottom:20px;
}
.table th{ background:#f2f2f2; }
.grand-total{
  font-size:18px;
  font-weight:800;
  color:#000;
}
.terms{
  font-size:13px;
  text-align:center;
  margin-top:20px;
}
@media print{
  body{background:#fff!important;}
  .no-print{display:none!important;}
}
</style>
</head><body>

<div class="invoice">
<div class="d-flex justify-content-between header">
<div>
${logoUrl.value?`<img src="${logoUrl.value}" style="max-height:70px"><br>`:""}
<h2 class="fs-2 fw-bold">${sName.value}</h2>
<div>${sAddress.value}</div>
<div>GSTIN: ${sGst.value}</div>
<div>Mobile: ${sMobile.value}${sEmail.value?` &nbsp; Email: ${sEmail.value}`:""}</div>
</div>
<div class="text-end">
<h4>TAX INVOICE</h4>
<div>${invoiceNo}</div>
<div>${new Date().toLocaleDateString()}</div>
</div>
</div>

<strong>Bill To:</strong>
<div>${cName.value}</div>
<div>${cAddress.value}</div>
${cMobile.value||cEmail.value?`<div>${cMobile.value?`Mobile: ${cMobile.value}`:""} ${cEmail.value?` Email: ${cEmail.value}`:""}</div>`:""}

<table class="table table-bordered mt-3">
<thead><tr>
<th>Product</th><th>HSN</th><th>Qty</th><th>Price</th>
<th>GST %</th><th>GST Amt</th><th>Total</th>
</tr></thead>
<tbody>${rowsHtml}</tbody>
</table>

<table class="table">
<tr><td>Taxable Value</td><td class="text-end">₹${taxable.toFixed(2)}</td></tr>
<tr><td>Total GST</td><td class="text-end">₹${gstTotal.toFixed(2)}</td></tr>
<tr style="background: #f2f2f2;"><td class="fw-bold">Grand Total</td><td class="text-end grand-total">₹${grandTotal.toFixed(2)}</td></tr>
</table>

<div class="row align-items-center text-center text-md-start">
<div class="col-12 col-md-6 mb-3 mb-md-0"><strong>Amount in Words:</strong><br>Rupees ${words} Only</div>
<div class="col-12 col-md-6 text-md-end">
<div id="qr" style="display: inline-block;"></div>
<div class="fw-bold small">Scan to Pay Rs.${grandTotal.toFixed(2)}</div>
</div>
</div>

<hr>
<div class="text-center small" style="
    font-size: .675em;
    color:#555;
">
Goods once sold will not be taken back. Payment due within 7 days.<br>
All disputes subject to local jurisdiction. This is a computer generated invoice.
</div>


<div class="d-flex gap-2 mt-3 no-print-buttons">

<button onclick="window.print()" class="btn btn-success d-print-none w-100 w-md-auto">Print / Save PDF</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"><\/script>
<script>
new QRCode(document.getElementById("qr"),{
text:"upi://pay?pa=917339392916@sbi&pn=Rahul.com&am=${grandTotal}&cu=INR&tr=${invoiceNo}",
width:120,height:120});
<\/script>

</div>
</body></html>`);
}
</script>
