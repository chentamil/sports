<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F6B5C">
  <title>Admin Login · SMSM Admin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/css/theme.css" rel="stylesheet">
</head>
<body>

  <header class="app-topbar">
    <span class="brand"><span class="brand-dot"></span> Admin Login</span>
    <div class="topbar-actions"></div>
  </header>

  <main class="app-main" style="padding-bottom: var(--space-5);">
    <div class="container-app">
      <div style="max-width: 360px; margin: var(--space-6) auto 0;">
  <div class="surface-card text-center">
    <div style="font-size: 30px; margin-bottom: var(--space-2);">🔐</div>
    <h2>Admin Login</h2>
    <form id="login-form" class="stack-md" style="text-align:left;">
      <div class="form-field">
        <label class="form-label" for="password">Password</label>
        <input type="password" class="form-control" id="password" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>
    <div id="login-result" style="margin-top: var(--space-3);"></div>
  </div>
</div>

<script>
  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const password = document.getElementById("password").value;
    const resultEl = document.getElementById("login-result");

    const res = await fetch("/api/admin-login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password })
    });
    const data = await res.json();

    if (data.success) {
      window.location.href = "/admin/";
    } else {
      resultEl.innerHTML = `<div class="alert alert-danger">${data.error || "Login failed"}</div>`;
    }
  });
</script>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
